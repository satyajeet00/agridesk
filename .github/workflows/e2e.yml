name: E2E

# Full-stack Playwright run. Slower than ci.yml (boots backend + frontend + DB),
# so it's NOT in the per-PR critical path. Runs:
#   - nightly at 21:00 UTC (02:30 IST)
#   - on manual trigger from the Actions tab
#   - on push to main (so the badge stays current)
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "agridesk-api/**"
      - "agridesk-web/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright UI (Chromium, live stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agridesk
          POSTGRES_PASSWORD: agridesk
          POSTGRES_DB: agridesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U agridesk"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agridesk-web/package-lock.json

      - name: Build backend JAR
        working-directory: agridesk-api
        run: mvn -B -ntp -DskipTests package

      - name: Start backend
        working-directory: agridesk-api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/agridesk
          SPRING_DATASOURCE_USERNAME: agridesk
          SPRING_DATASOURCE_PASSWORD: agridesk
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          JWT_SECRET: e2e-test-secret-key-do-not-use-in-production-must-be-long-enough-for-hmac-sha512-at-least-512-bits-please
          CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
        run: |
          nohup java -jar target/agridesk-api-0.0.1-SNAPSHOT.jar > backend.log 2>&1 &
          echo "Waiting for backend health..."
          for i in {1..60}; do
            if curl -fs http://127.0.0.1:8080/actuator/health > /dev/null 2>&1 \
               || curl -fs http://127.0.0.1:8080/v3/api-docs > /dev/null 2>&1; then
              echo "backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to start; last 200 lines of log:"
          tail -n 200 backend.log
          exit 1

      - name: Install frontend deps
        working-directory: agridesk-web
        run: npm ci

      - name: Build frontend
        working-directory: agridesk-web
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
        run: npm run build

      - name: Start frontend
        working-directory: agridesk-web
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
          PORT: "3000"
        run: |
          nohup npm start -- --port 3000 > frontend.log 2>&1 &
          echo "Waiting for frontend..."
          for i in {1..60}; do
            if curl -fs http://127.0.0.1:3000 > /dev/null; then
              echo "frontend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "frontend failed to start; last 200 lines of log:"
          tail -n 200 frontend.log
          exit 1

      - name: Install Playwright browsers
        working-directory: agridesk-web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: agridesk-web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: agridesk-web/playwright-report/
          retention-days: 14

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: agridesk-api/backend.log
          retention-days: 7
